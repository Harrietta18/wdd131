<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Community | LagosHub Connect</title>
    <link rel="stylesheet" href="styles/project.css">
    <script src="scripts/project.js" defer></script>
</head>
<body>
    <header><h1>LagosHub Connect</h1></header>
    <nav>
        <a href="index.html">Directory</a>
        <a href="join.html">Join Us</a>
        <a href="about.html">About</a>
    </nav>

    <main>
        <section class="form-container">
            <h2>Partner With Us</h2>
            <p>Are you a hub owner? Register your space below.</p>
            <form action="thanks.html" method="get" class="hub-form">
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" required>

                <label for="hname">Hub Name:</label>
                <input type="text" id="hname" name="hname" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">

                <label for="location">Location:</label>
                <select id="location" name="location">
                    <option value="yaba">Yaba</option>
                    <option value="lekki">Lekki</option>
                    <option value="ikeja">Ikeja</option>
                    <option value="victoria-island">Victoria Island</option>
                </select>

                <label for="message">About Your Hub:</label>
                <textarea id="message" name="message" rows="4"></textarea>

                <button type="submit" class="btn">Register Hub</button>
            </form>
        </section>
    </main>

    <footer>
        <p>©<span id="year"></span> | Erhurhe Harrietta | <a href="references.html">References</a></p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
