<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Page | Nigeria</title>
    <meta name="author" content="Erhurhe Harrietta">
    <meta name="description" content="A page dedicated to Nigeria, featuring weather and location data.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css" media="screen and (min-width: 600px)">

    <script src="scripts/getdates.js" defer></script>
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Nigeria</h1>
    </header>

    <main>
        <div class="hero">
            <picture>
                <source srcset="images/nigeria.webp" media="(min-width: 1000px)">
                <source srcset="images/nigeria.webp" media="(min-width: 600px)">
                <img src="images/nigeria.webp" alt="Landscape of Nigeria" class="hero-img" width="450" height="300" loading="eager">
            </picture>
            <h2 class="hero-label">The Giant of Africa</h2>
        </div>

        <section class="data-container">
            <div class="data-card">
                <h3>Main Information</h3>
                <p><strong>Capital:</strong> Abuja</p>
                <p><strong>Population:</strong> 218 Million</p>
                <p><strong>Language:</strong> English</p>
                <p><strong>Currency:</strong> Naira</p>
            </div>

            <div class="weather-card">
                <h3>Weather</h3>
                <img src="images/weather.png" alt="Sunny Weather Icon" width="50" height="50">
                <p><strong>Temperature:</strong> <span id="temp">30</span>°C</p>
                <p><strong>Conditions:</strong> Sunny</p>
                <p><strong>Wind:</strong> <span id="wind">5</span> km/h</p>
                <p><strong>Wind Chill:</strong> <span id="windchill">N/A</span></p>
            </div>
        </section>
    </main>

    <footer>
        <p>©<span id="currentyear"></span> | Erhurhe Harrietta | Nigeria</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
